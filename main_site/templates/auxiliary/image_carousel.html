{% load static %}
<section class="hero-carousel" data-carousel aria-label="Race photo carousel">
  <div class="hero-carousel__slides">
    {% for image in carousel_images %}
    {% if forloop.first %}
    <img
      src="{% static image %}"
      class="hero-carousel__slide is-active"
      alt=""
    />
    {% else %}
    <img
      src="{% static image %}"
      class="hero-carousel__slide"
      alt=""
      aria-hidden="true"
    />
    {% endif %}
    {% empty %}
    <img
      src="{% static 'images/carousel/main.jpg' %}"
      class="hero-carousel__slide is-active"
      alt=""
    />
    {% endfor %}
  </div>

  {% if carousel_images|length > 1 %}
  <button
    class="hero-carousel__control hero-carousel__control--prev"
    type="button"
    data-carousel-prev
    aria-label="Previous photo"
  >
    <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
  </button>
  <button
    class="hero-carousel__control hero-carousel__control--next"
    type="button"
    data-carousel-next
    aria-label="Next photo"
  >
    <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
  </button>

  <div class="hero-carousel__dots" aria-label="Choose photo">
    {% for image in carousel_images %}
    <button
      class="hero-carousel__dot{% if forloop.first %} is-active{% endif %}"
      type="button"
      data-carousel-dot="{{ forloop.counter0 }}"
      aria-label="Show photo {{ forloop.counter }}"
      {% if forloop.first %}aria-current="true"{% endif %}
    ></button>
    {% endfor %}
  </div>
  {% endif %}
</section>
