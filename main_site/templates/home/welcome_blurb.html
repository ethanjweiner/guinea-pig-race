{% load static %}
<div
  class="relative h-fit w-11/12 overflow-visible rounded-e-xl px-10 py-8 shadow-xl"
>
  <img
    src="{% static 'images/uncle_sam.png' %}"
    class="uncle-sam z-100 w-25 lg:w-35 absolute -right-5 -top-12 lg:-right-10 lg:-top-24"
  />
  <h1 class="text-white font-fast block text-4xl font-bold">Welcome.</h1>
  <p class="text-white font-tech mb-2 mt-4 block text-lg">
    Purity of competition. Friendship. Love.
    <strong class="text-yellow-300 italic">The Guinea Pig Mile.</strong>
  </p>
  <div
    class="from-transparent via-white to-transparent mb-5 h-0.5 w-full bg-gradient-to-r via-20%"
  ></div>
  <ul class="text-white font-tech mb-6 block list-inside list-decimal text-lg">
    <li>
      LOCATION:
      <span class="font-extrabold">The Track at Danehy Park, Cambridge</span>
    </li>
    <li>
      DATE: <span class="font-extrabold">Saturday, August 8th, 2026</span>
    </li>
    <li>&nbsp;TIME: <span class="font-extrabold">6:00 PM</span></li>
  </ul>
  <div class="flex flex-wrap items-center gap-4">
    <a
      href="{% url 'register' %}"
      class="from-yellow-500 to-yellow-200 text-black rounded-4xl font-race flex w-fit cursor-pointer items-center gap-2 bg-gradient-to-r px-6 py-3 text-xl uppercase shadow-xl"
    >
      Register
      <img src="{% static 'images/register.png' %}" class="w-8 invert" />
    </a>
    <button
      type="button"
      data-promo-open
      class="from-orange-500 via-orange-700 to-red-900 text-white rounded-4xl font-race flex w-fit cursor-pointer items-center gap-2 whitespace-nowrap bg-gradient-to-br px-5 py-3 text-xl uppercase shadow-xl lg:px-6"
    >
      Watch the Promo
      <i class="fa-solid fa-circle-play text-2xl" aria-hidden="true"></i>
    </button>
  </div>
</div>

<div
  id="promo-modal"
  class="promo-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="promo-modal-title"
  aria-hidden="true"
  data-promo-modal
>
  <button
    type="button"
    class="promo-modal__backdrop"
    aria-label="Close promo video"
    data-promo-close
  ></button>
  <div class="promo-modal__panel" role="document">
    <div class="promo-modal__header">
      <h2 id="promo-modal-title" class="font-race text-white text-xl uppercase">
        Promo
      </h2>
      <button
        type="button"
        class="promo-modal__close"
        aria-label="Close promo video"
        data-promo-close
      >
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    </div>
    <div class="promo-modal__video">
      <iframe
        data-promo-iframe
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</div>
